services:
  - type: web
    name: n8n-bot
    env: docker
    plan: free
    numInstances: 1
    dockerCommand: n8n start
    envVars:
      - key: N8N_HOST
        value: n8n-bot.onrender.com
      - key: N8N_PORT
        value: "8080"
      - key: WEBHOOK_URL
        value: https://n8n-bot.onrender.com/
